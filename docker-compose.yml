services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sundry
      POSTGRES_PASSWORD: sundry
      POSTGRES_DB: sundry
    ports:
      - "5432:5432"
    volumes:
      - sundry_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sundry"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgres://sundry:sundry@db:5432/sundry
    command: ["bun", "run", "dev"]

volumes:
  sundry_db_data:
